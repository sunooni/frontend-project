<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>HTML Academy: Седона</title>
  </head>
  <body>
    <main>
      <h1>Поиск гостиницы в Седоне</h1>
      <form>
        <ul>
          <li>
            <label for="arrival-date">Дата Заезда: </label>
            <input type="date" id="arrival-date" name="arrival-date" />
          </li>

          <li>
            <label for="departure-date">Дата Выезда: </label>
            <input type="date" id="departure-date" name="departure-date" />
          </li>

          <li>
            <label for="adults">Взрослые: </label>
            <input
              type="number"
              id="adults"
              name="adults"
              min="1"
              max="10"
              value="2"
              step="1"
            />
          </li>

          <li>
            <label for="children">Дети: </label>
            <input
              type="number"
              id="children"
              name="children"
              min="1"
              max="10"
              value="2"
              step="1"
            />
          </li>
          <li><button type="submit">Найти</button></li>
        </ul>
      </form>
    </main>
  </body>
</html>
